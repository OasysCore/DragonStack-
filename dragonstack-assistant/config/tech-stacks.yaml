  ecommerce:
    - "电商"
    - "商城"
    - "购物"
    - "ecommerce"
    - "shop"
    - "store"
  
  blog:
    - "博客"
    - "blog"
    - "内容"
    - "文章"
    - "cms"
  
  chat:
    - "聊天"
    - "消息"
    - "即时通讯"
